<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Philip Luo — Portfolio</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0;
        height: 100%;
        background: #0d0b14;
        overflow: hidden;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
      }
      #game {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
      }
      /* Crisp upscaling for low-res pixel art */
      #game canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
